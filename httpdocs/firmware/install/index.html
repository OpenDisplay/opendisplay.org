<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenDisplay Toolbox</title>
  <link rel="canonical" href="https://opendisplay.org/firmware/toolbox/">
</head>
<body>
  <p>Redirecting to the <a id="link" href="/firmware/toolbox/index.html">OpenDisplay Toolbox</a>…</p>
  <script>
    (function () {
      var target = new URL('/firmware/toolbox/index.html', window.location.origin);
      new URL(window.location.href).searchParams.forEach(function (value, key) {
        target.searchParams.set(key, value);
      });
      var href = target.pathname + target.search + target.hash;
      document.getElementById('link').href = href;
      window.location.replace(href);
    })();
  </script>
</body>
</html>
